name: Build Report

on:
  push:
    branches: [ "main", "chore/pdf-build" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc and XeLaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-fonts-extra

      - name: Create URL-encoded copies of image files containing spaces
        run: |
          find docs assets -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" \) 2>/dev/null | \
          while IFS= read -r f; do
            dir=$(dirname "$f")
            base=$(basename "$f")
            encoded="${base// /%20}"
            if [ "$base" != "$encoded" ]; then
              cp "$f" "$dir/$encoded"
            fi
          done

      - name: Build Full PDF
        run: |
          pandoc README.md report/*.md \
            --pdf-engine=xelatex \
            --output=report/output.pdf \
            --toc \
            --standalone \
            -V geometry:margin=2cm \
            -V documentclass=article \
            -V lang=es \
            -V mainfont="DejaVu Serif" \
            -V monofont="DejaVu Sans Mono"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: full-report-pdf
          path: report/output.pdf
          retention-days: 30